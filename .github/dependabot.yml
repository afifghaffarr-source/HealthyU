# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    # Group related updates to reduce PR noise
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/*"
          - "@vitest/*"
          - "typescript"
          - "typescript-eslint"
          - "@eslint/*"
          - "eslint"
          - "prettier"
          - "eslint-plugin-*"
          - "eslint-config-*"
    # Only allow minor + patch updates; major versions require manual review
    # (browserslist, recharts, zod, vite, react majors are breaking)
    ignore:
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "globals"
        update-types: ["version-update:semver-major"]
    # Auto-assign + label
    labels:
      - "dependencies"
      - "automated-pr"
    # Commit message format (commitlint subject-case requires lowercase)
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    # PR title format
    pull-request-branch-name:
      separator: "-"
    # Allow GitHub Actions to push to PRs (auto-merge via gh workflow later)
    # NOT enabling auto-merge yet — manual review per team policy
