name: ci

on:
  push:
    branches: [main]
  pull_request:

# Concurrency: cancel in-progress runs for the same PR/branch when a new
# commit is pushed. Saves CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # TanStack Start SSR transform of 45+ feature modules + 130 route
    # handlers blows the default 1.5 GB V8 heap (see commit f0e12237).
    # `NODE_OPTIONS=--max-old-space-size=4096` is set both here and in
    # package.json scripts; keep these in sync.
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build (Cloudflare Pages target)
        run: bun run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  bundle-size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34
      - run: bun install --frozen-lockfile
      - name: Build and check size
        run: |
          bun run build
          # Fail if the largest client chunk exceeds 1 MB
          LARGEST=$(find dist/client/assets -name "*.js" -size +1024k | head -1)
          if [ -n "$LARGEST" ]; then
            echo "::error::Client chunk $LARGEST exceeds 1 MB budget"
            find dist/client/assets -name "*.js" -size +1024k -exec ls -lh {} \;
            exit 1
          fi
          echo "✅ All client chunks under 1 MB"

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        run: |
          # gitleaks-style scan: look for common secret prefixes in tracked files
          # Excludes bun.lock, node_modules, .env.example
          PATTERNS='(VEXO_API_KEY|API[_-]?KEY|SECRET|SERVICE_ROLE|PASSWORD|PRIVATE[_-]KEY|BEGIN [A-Z ]+ PRIVATE KEY)\s*[:=]\s*["\x27][A-Za-z0-9_\-]{16,}'
          if git ls-files | xargs grep -EnH "$PATTERNS" --exclude-dir=node_modules --exclude=bun.lock --exclude=.env.example 2>/dev/null; then
            echo "::error::Possible secret committed. Use .env.example as template."
            exit 1
          fi
          echo "✅ No secrets found in tracked files"
