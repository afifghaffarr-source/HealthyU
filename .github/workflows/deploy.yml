# Deploy to Cloudflare Workers (healthyu)
# Docs: https://developers.cloudflare.com/workers/wrangler/ci-cd/
#
# Triggers on push to main. Requires these GitHub repo secrets (Settings → Secrets → Actions):
#   - CLOUDFLARE_API_TOKEN — https://dash.cloudflare.com/profile/api-tokens
#       Template: "Edit Cloudflare Workers" + account.resources = include specific Worker
#   - CLOUDFLARE_ACCOUNT_ID — CF dashboard → Workers & Pages → right sidebar
#
# Why this exists: The old workflow was manual `wrangler deploy` after each PR merge,
# which led to production drift (latest commits never reached healthyu.web.id).
# This makes deploy automatic on every main merge, after CI passes.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual deploy reason (logged in CF deploy log)"
        required: false
        default: "manual trigger"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy (could leave prod broken)

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy after CI passes (lint + typecheck + test + build)
    # branch protection enforces this via required status check "ci/check"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Cloudflare Workers target)
        run: bun run build

      - name: Verify build output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ not found after build"
            exit 1
          fi
          ls -la dist/ | head -10
          echo "✅ Build output present"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "."
          # Don't bust CF cache: serve stale during deploy (zero-downtime)
          # Wrangler 3.x does this by default for Workers
          command: deploy
          # Pass through deploy metadata for audit trail
          deployCommand: deploy --var "GIT_SHA=${{ github.sha }}" --var "DEPLOYED_BY=${{ github.actor }}" --message "Deploy ${{ github.sha }} via GitHub Actions"

      - name: Smoke test production
        # Verify the deployment actually works end-to-end
        # Catches env var drift, routing breaks, 500 spikes
        run: |
          echo "::group::Smoke test production endpoints"
          for path in / /auth /artikel /faq /api/health; do
            status=$(curl -sI -o /dev/null -w "%{http_code}" "https://healthyu.web.id$path" --max-time 15)
            echo "  $path → HTTP $status"
            if [ "$path" = "/" ] || [ "$path" = "/auth" ] || [ "$path" = "/api/health" ]; then
              if [ "$status" != "200" ]; then
                echo "::error::$path should return 200, got $status"
                exit 1
              fi
            fi
            if [ "$path" = "/artikel" ] || [ "$path" = "/faq" ]; then
              # /artikel and /faq may return 200 (with empty data) or 200 with errors visible.
              # The PREVIOUS bug was 500 with "Missing Supabase env vars" — anything other than 200 indicates env drift.
              if [ "$status" != "200" ]; then
                echo "::error::$path should return 200 (was 500 before env fix), got $status"
                echo "::error::This usually means CF production env is missing SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY"
                exit 1
              fi
            fi
          done
          echo "✅ All smoke tests passed"
          echo "::endgroup::"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to production failed!"
          echo "::error::Action: check https://dash.cloudflare.com → Workers → healthyu → Deployments"
          echo "::error::Action: check GitHub Actions logs for this run"
          echo "::error::Action: if env drift suspected, run: wrangler secret list"
