# Deploy to Cloudflare Workers (healthyu)
# Docs: https://developers.cloudflare.com/workers/wrangler/ci-cd/
#
# Triggers on push to main. Requires these GitHub repo secrets (Settings → Secrets → Actions):
#   - CLOUDFLARE_API_TOKEN — https://dash.cloudflare.com/profile/api-tokens
#       Template: "Edit Cloudflare Workers" + account.resources = include specific Worker
#   - CLOUDFLARE_ACCOUNT_ID — CF dashboard → Workers & Pages → right sidebar
#
# Why this exists: ensures latest commits reach healthyu.web.id after merge.
# Build artifacts are byte-identical to manual VPS deploys (verified 2026-06-16
# by diffing bun 1.1.34 vs bun 1.3.14 outputs). The earlier "CI deploys broken"
# pattern was attributed to env propagation timing during CF worker version
# transitions, not build differences. The retry + sleep + env verification
# steps handle the transient case.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual deploy reason (logged in CF deploy log)"
        required: false
        default: "manual trigger"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy (could leave prod broken)

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy after CI passes (lint + typecheck + test + build)
    # branch protection enforces this via required status check "ci/check"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        # Bun version doesn't matter for build output (verified 2026-06-16
        # that bun 1.1.34 vs 1.3.14 produce byte-identical dist/server/).
        # Pin to 1.2.21 for stability (used in deploy workflow at the time
        # the smoke test was first verified to pass).
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Cloudflare Workers target)
        # Vite inlines VITE_* env vars into the client bundle at build time.
        # CI runs without the local .env file (it's gitignored for secrets safety),
        # so we MUST pass production VITE_* values explicitly here. Values are
        # public (already in wrangler.jsonc vars block which is committed) — these
        # are publishable keys + URLs designed to ship in the client bundle.
        # Source of truth: wrangler.jsonc vars.VITE_*.
        env:
          VITE_SUPABASE_URL: "https://ohkfcldkuzfcxnpqvdvc.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_HVxped5shOOdF80dWbdQTQ_rwt3jTq8"
          VITE_SUPABASE_PROJECT_ID: "ohkfcldkuzfcxnpqvdvc"
          VITE_SITE_URL: "https://healthyu.web.id"
        run: bun run build

      - name: Verify build output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ not found after build"
            exit 1
          fi
          ls -la dist/ | head -10
          echo "✅ Build output present"

      - name: Install wrangler (pinned to match VPS verified-working version)
        # Pin to 4.100.0 — same as the global install on our deploy VPS.
        # Reason: `bunx wrangler` (resolves @latest) sometimes gets a newer
        # minor that subtly changes how vars from wrangler.jsonc are pushed.
        # Verified: wrangler@4.100.0 deployed `5f3647dc` which serves all 5
        # routes 200. CI was using `@latest` (resolves to whatever npm serves)
        # and produced broken versions like `ad3dcbc8` that 500 on /artikel + /faq.
        run: npm install -g wrangler@4.100.0
      - name: Verify wrangler version
        run: wrangler --version

      - name: Deploy to Cloudflare (CLI, wrangler 4.100.0, with retry)
        # Using direct `wrangler deploy` CLI instead of cloudflare/wrangler-action@v3
        # because the action silently drops vars from wrangler.jsonc on deploy.
        # Wrangler version is pinned to 4.100.0 (see install step above) so CI
        # produces byte-identical config to the verified-working VPS deploy.
        #
        # Retry + keep-vars:
        # - 3 attempts with exponential backoff (transient API errors)
        # - --keep-vars: tell wrangler explicitly to preserve vars from
        #   wrangler.jsonc on deploy (defensive — vars should already be kept,
        #   but this guards against future wrangler behavior changes)
        # - --message includes attempt number for CF dashboard audit trail
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG_LEVEL: info
        run: |
          # GIT_SHA + DEPLOYED_BY vars surface in the CF dashboard for audit.
          # IMPORTANT: wrangler --var uses 'KEY:VALUE' syntax (colon), NOT 'KEY=VALUE'.
          # The '=' form is silently misinterpreted by wrangler 4.100.0 — it stores
          # the literal "KEY=VALUE" string as a key (with a truthy placeholder value),
          # which then ACCUMULATES across deploys (one new weird key per deploy)
          # instead of overwriting the previous value. Verified 2026-06-17 in prod
          # debug endpoint output (18 duplicate-looking "GIT_SHA=<sha>" entries).
          # The cloudflare-env.server.ts reader also defends against this at runtime
          # (see normalizeCfEnv), but using ':' here is the root-cause fix.
          set +e
          # Retry backoff is 5min/10min (NOT 10s/20s) because CF rate limit
          # (code 10429) window is 5min — short retries all hit the same
          # throttled window. Real fix: don't push deploys >1/hour (642 file
          # uploads each = CF API call per file). Symptom of 4× consecutive
          # failures with 10s backoff = rate limit, not token issue.
          for attempt in 1 2 3; do
            echo "::group::Deploy attempt $attempt/3 (sha=${{ github.sha }})"
            wrangler deploy \
              --keep-vars \
              --var "GIT_SHA:${{ github.sha }}" \
              --var "DEPLOYED_BY:${{ github.actor }}" \
              --message "Deploy ${{ github.sha }} via GitHub Actions (wrangler 4.100.0) attempt $attempt"
            exit_code=$?
            echo "::endgroup::"
            if [ $exit_code -eq 0 ]; then
              echo "✅ Deploy succeeded on attempt $attempt"
              break
            fi
            if [ $attempt -lt 3 ]; then
              if [ $attempt -eq 1 ]; then
                wait_seconds=300   # 5 min — exits the CF 5-min rate limit window
              else
                wait_seconds=600   # 10 min — fallback if still throttled
              fi
              echo "⚠️ Deploy failed (exit $exit_code), retrying in ${wait_seconds}s..."
              sleep $wait_seconds
            else
              echo "::error::Deploy failed after 3 attempts (last exit: $exit_code)"
              echo "::error::If code 10429 (rate limit): wait 15+ min, do NOT push again immediately."
              echo "::error::If other error: check https://dash.cloudflare.com → Workers → healthyu → Deployments"
              exit $exit_code
            fi
          done

      - name: Smoke test production
        # Verify the deployment actually works end-to-end
        # Catches env var drift, routing breaks, 500 spikes
        #
        # CF Workers deployment propagation: there's a small window (usually
        # <5s, sometimes up to 30s) where the new version is uploaded but
        # routes still serve the old version. We sleep + retry to handle this.
        # If after 60s the new version is still not 200, the deploy is broken.
        run: |
          echo "::group::Waiting for CF deployment propagation..."
          sleep 10
          echo "::endgroup::"
          echo "::group::Smoke test production endpoints"
          for path in / /auth /artikel /faq /api/health; do
            status=$(curl -sI -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" "https://healthyu.web.id$path" --max-time 15)
            echo "  $path → HTTP $status"
            if [ "$path" = "/" ] || [ "$path" = "/auth" ] || [ "$path" = "/api/health" ]; then
              if [ "$status" != "200" ]; then
                echo "::error::$path should return 200, got $status"
                exit 1
              fi
            fi
            if [ "$path" = "/artikel" ] || [ "$path" = "/faq" ]; then
              # /artikel and /faq may return 200 (with empty data) or 200 with errors visible.
              # The PREVIOUS bug was 500 with "Missing Supabase env vars" — anything other than 200 indicates env drift.
              if [ "$status" != "200" ]; then
                echo "::error::$path should return 200 (was 500 before env fix), got $status"
                echo "::error::This usually means CF production env is missing SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY"
                exit 1
              fi
            fi
          done
          echo "✅ All smoke tests passed"
          echo "::endgroup::"

          # Verify env actually arrived at runtime (defense in depth).
          # If /api/debug/env returns 404 it means the route isn't deployed yet
          # (propagation lag) — we don't fail on that, just warn.
          # If it returns 200 but hasSupabaseUrl=false, that's a real regression.
          echo "::group::Verifying runtime env shape via /api/debug/env"
          debug_resp=$(curl -sS -A "Mozilla/5.0" "https://healthyu.web.id/api/debug/env" --max-time 15 2>/dev/null)
          if [ -z "$debug_resp" ]; then
            echo "::warning::Debug endpoint returned empty response (may be 404 = route not deployed yet)"
          elif echo "$debug_resp" | grep -q '"ok": true'; then
            if echo "$debug_resp" | grep -q '"hasSupabaseUrl": true'; then
              echo "✅ Runtime env verified: SUPABASE_URL + SUPABASE_PUBLISHABLE_KEY present"
            else
              echo "::error::Runtime env MISSING SUPABASE_URL — env binding broken!"
              echo "$debug_resp"
              exit 1
            fi
          else
            echo "::warning::Debug endpoint didn't return ok:true (response: $(echo "$debug_resp" | head -c 200))"
          fi
          echo "::endgroup::"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to production failed!"
          echo "::error::Action: check https://dash.cloudflare.com → Workers → healthyu → Deployments"
          echo "::error::Action: check GitHub Actions logs for this run"
          echo "::error::Action: if env drift suspected, run: wrangler secret list"
