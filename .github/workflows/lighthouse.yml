name: lighthouse

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
        env:
          # Build needs Supabase publishable env to embed VITE_* vars.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}
      # LIGHTHOUSE-001 proper fix: lhci's vite preview runs as plain Node, so
      # the @cloudflare/vite-plugin's .dev.vars auto-bridge (workerd isolate)
      # doesn't apply. We materialize a .dev.vars with placeholder SSR env so
      # the lhci startServerCommand can `set -a && . ./.dev.vars && set +a`.
      # Real production secrets are still only in the CF dashboard. SSR calls
      # to placeholder Supabase will fail gracefully via route errorComponent.
      - name: Create .dev.vars for LHCI SSR
        run: |
          cat > .dev.vars <<'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY=sb_publishable_placeholder
          SUPABASE_SERVICE_ROLE_KEY=sb_secret_placeholder
          VEXO_API_KEY=placeholder
          VEXO_BASE_URL=https://placeholder.vexo.ai
          CRON_SECRET=placeholder-cron-secret
          VAPID_PRIVATE_KEY=placeholder
          VAPID_PUBLIC_KEY=placeholder
          EOF
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Cleanup .dev.vars
        if: always()
        run: rm -f .dev.vars
