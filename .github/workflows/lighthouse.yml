name: lighthouse

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      # LIGHTHOUSE-001 proper fix: materialize a placeholder .dev.vars BEFORE
      # build so @cloudflare/vite-plugin can embed the placeholder SSR env into
      # dist/ (it warns + embeds at build time, not preview time). Production
      # secrets are still only in the CF dashboard — the placeholder values
      # here never reach production. SSR calls to placeholder Supabase fail
      # gracefully via route errorComponent, pages still load for lhci.
      - name: Create .dev.vars for build + lhci
        run: |
          cat > .dev.vars <<'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY=sb_publishable_placeholder
          SUPABASE_SERVICE_ROLE_KEY=sb_secret_placeholder
          VEXO_API_KEY=placeholder
          VEXO_BASE_URL=https://placeholder.vexo.ai
          CRON_SECRET=placeholder-cron-secret
          VAPID_PRIVATE_KEY=placeholder
          VAPID_PUBLIC_KEY=placeholder
          EOF
      - name: Build
        run: bun run build
        env:
          # Build needs Supabase publishable env to embed VITE_* vars.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}
          # Sprint 6b `og:build` script (scripts/generate-og-images.mjs) reads
          # SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY directly from process.env
          # (not VITE_* prefixed). Without these, build exits with
          # "❌ Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY".
          # Real values needed so the script can fetch recipes/articles for
          # OG image generation. .dev.vars placeholder values are only safe
          # for SSR at preview time, not for build-time data fetches.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Run Lighthouse CI
        # Belt-and-suspenders: also source .dev.vars at preview time in case
        # any SSR code reads process.env at module-load (not embedded fallback).
        run: set -a && . ./.dev.vars && set +a && npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Cleanup .dev.vars
        if: always()
        run: rm -f .dev.vars
