name: lint-constants

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-constants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - run: bun run lint:constants
      - run: bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin to 1.2.21: matches packageManager + v8 inspector works for coverage.
          # bun 1.3.x removes/changes node:inspector → coverage-v8 returns 0% silently.
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - run: bunx vitest run --coverage --coverage.reporter=text --coverage.reporter=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
