name: Weekly Pattern Digest

on:
  schedule:
    - cron: "0 2 * * 1" # Monday 2am UTC (9am WIB)
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send Weekly Pattern Digests
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "❌ CRON_SECRET repo secret is not set (Settings → Secrets → Actions)"
            exit 1
          fi

          # Strip any trailing whitespace/newlines from secret
          CLEAN_SECRET=$(echo -n "$CRON_SECRET" | tr -d '\n\r' | xargs)

          echo "Debug: Secret length = ${#CLEAN_SECRET}"

          response=$(curl -X POST "https://healthyu.web.id/api/sendWeeklyDigests" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ***" \
            -w "\n%{http_code}" \
            -s)

          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "Response: $body"
          echo "Status: $status"

          if [ "$status" != "200" ]; then
            echo "❌ Digest send failed with status $status"
            exit 1
          fi

          echo "✅ Weekly digests sent successfully"
