name = "healthyu"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# These MUST be set in CF Pages dashboard (Build & deployments section):
#   - Build command: bun run build
#   - Build output directory: dist
#   - Root directory: (empty)
# The wrangler.toml Pages schema doesn't accept [build] section (Workers only).
# Set via dashboard or first push will use Cloudflare's auto-detection.

# Production secrets are managed via:
#   wrangler pages secret put <KEY> --project-name healthyu
# Build env vars (VITE_*) are managed via CF dashboard or PATCH /pages/projects.

[vars]
# Public, non-secret build-time constants
NODE_ENV = "production"
